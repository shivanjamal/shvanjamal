<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no" />
    <title>Prediction & World Chat Dashboard</title>
    <script>
        // Force zoom prevention via JS
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        let dashLastTouch = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - dashLastTouch <= 300) e.preventDefault();
            dashLastTouch = now;
        }, false);
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #f8f9fa;
            --sidebar: #2f150c;
            --accent: #8b351c;
            --white: #ffffff;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
        }

        body {
            background-color: var(--bg);
            display: flex;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        input,
        textarea {
            user-select: auto !important;
            -webkit-user-select: auto !important;
        }

        /* Dashboard Layout */
        .sidebar {
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5rem;
            color: #f6ebe7;
            padding: 20px 0;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover,
        .nav-item.active {
            background: var(--accent);
        }

        .logout-btn {
            margin-top: auto;
            background: #c0392b !important;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        /* Sections */
        .section {
            display: none;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        h3 {
            margin-bottom: 20px;
            color: var(--sidebar);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        /* Mobile Styles (Phone) */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 94%;
                flex-direction: row;
                height: 70px;
                position: fixed;
                bottom: 15px;
                left: 3%;
                right: 3%;
                padding: 10px 5px;
                z-index: 1000;
                justify-content: space-around;
                background: rgba(47, 21, 12, 0.95);
                backdrop-filter: blur(10px);
                border-radius: 25px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .sidebar-header {
                display: none;
            }

            .mobile-header {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                padding: 12px;
                background: rgba(47, 21, 12, 0.9);
                backdrop-filter: blur(10px);
                color: white;
                position: sticky;
                top: 0;
                z-index: 1001;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }

            .mobile-header img {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: 2px solid rgba(255,255,255,0.4);
                object-fit: cover;
                box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            }

            .mobile-header span {
                font-weight: 900;
                font-size: 1.2rem;
                letter-spacing: 0.5px;
                text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            }

            .nav-item { 
                margin-bottom: 0; 
                padding: 5px; 
                flex-direction: column; 
                font-size: 0.7rem; 
                gap: 2px; 
                flex: 1; 
                text-align: center; 
                color: rgba(255,255,255,0.6);
            }

            .nav-item.active {
                background: transparent;
                color: #fff;
            }

            .nav-item i {
                font-size: 1.4rem;
                transition: 0.3s;
            }

            .nav-item.active i {
                transform: translateY(-3px);
            }

            .main-content {
                padding: 15px;
                padding-bottom: 110px;
            }

            .logout-btn {
                margin-top: 0;
                background: transparent !important;
                color: #ff7675;
            }
        }

        @media (min-width: 769px) {
            .mobile-header { display: none; }
            .sidebar {
                width: 260px;
                height: 100vh;
                position: sticky;
                top: 0;
            }

            .main-content {
                padding: 30px;
            }
        }

        /* Improved Chat UI */
        #chat {
            padding: 0;
        }

        #chatBox {
            height: calc(100vh - 160px);
            overflow-y: auto;
            background: #f1f2f6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 1px solid #ddd;
        }

        .msg {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 75%;
            position: relative;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .msg-me {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .msg-other {
            background: #e9e9eb;
            color: var(--text);
            border-bottom-left-radius: 2px;
        }

        .msg-user {
            font-size: 0.7rem;
            font-weight: 800;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            opacity: 0.8;
            color: #777;
        }

        .msg-me .msg-user {
            color: white;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            position: sticky;
            bottom: 0;
        }

        .chat-input-area input {
            border-radius: 25px;
            padding-inline: 20px;
            background: #f8f9fa;
        }

        .send-btn {
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: 0.2s;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        @media (max-width: 768px) {
            #chatBox {
                height: calc(100vh - 150px);
            }

            .chat-input-area {
                bottom: 70px;
            }
        }

        /* Forms */
        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--sidebar);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Mobile Top Header -->
    <div class="mobile-header">
        <img src="logo.png" alt="Logo">
        <span>Prediction App</span>
    </div>

    <div class="sidebar">
        <div class="sidebar-header" style="text-align: center; padding: 20px 0;">
            <img src="logo.png" alt="Logo"
                style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); object-fit: cover;">
            <h2 style="margin-top: 10px; margin-bottom: 0; font-size: 1.2rem;">Prediction App</h2>
        </div>
        <div class="nav-item active" onclick="showSection('predictions')"><i class="fas fa-chart-line"></i> پێشبینی
        </div>
        <div class="nav-item" onclick="showSection('chat')"><i class="fas fa-comments"></i> جیهانا چاتێ</div>
        <div class="nav-item" onclick="showSection('support')"><i class="fas fa-headset"></i> پشتیوانی</div>
        <div class="nav-item" onclick="showSection('profile')"><i class="fas fa-user"></i> پرۆفایل</div>
    </div>

    <div class="main-content">
        <!-- Predictions -->
        <div id="predictions" class="section active">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> پێشبینییا نوو پۆست بکە</h3>
                <form id="predictionForm">
                    <input type="text" id="matchName" placeholder="یاری: ریال مەدرید - بەرشەلۆنە" required
                        style="margin-bottom: 10px;">
                    <input type="text" id="predictedScore" placeholder="ئەنجام: 2 - 1" required
                        style="margin-bottom: 10px;">
                    <button type="submit" class="btn">بلاڤ بکە</button>
                </form>
            </div>
            <div id="predictionList">
                <h3>هەموو پێشبینی</h3>
                <p style="color:grey">ل هیڤیێ بن...</p>
            </div>
        </div>

        <!-- World Chat -->
        <div id="chat" class="section">
            <div
                style="background: white; padding: 15px 25px; border-bottom: 2px solid var(--bg); display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-globe" style="color: var(--accent); font-size: 1.2rem;"></i>
                <h3 style="margin-bottom: 0; border: none;">چاتا جیهانی (World Chat)</h3>
            </div>
            <div id="chatBox"></div>
            <form id="chatForm" class="chat-input-area">
                <input type="text" id="chatInput" placeholder="نامەیەکێ بنووسە..." required autocomplete="off">
                <button type="submit" class="btn send-btn"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>

        <!-- Profile -->
        <div id="profile" class="section">
            <div class="card">
                <h3><i class="fas fa-id-card"></i> زانیاریێن کەسی</h3>
                <label>ئیمەیڵ</label><input type="text" id="profileEmail" disabled style="margin-bottom: 15px;">
                <label>ناڤێ تە</label><input type="text" id="profileDisplayName" style="margin-bottom: 15px;">
                <button id="saveProfileBtn" class="btn">پاشکەفتن (Save)</button>
            </div>
            <div class="card">
                <h3>گوهۆڕینا وشەی نهێنی</h3>
                <button id="changePassBtn" class="btn" style="background: var(--sidebar); margin-bottom: 20px;">ناردنا
                    لینکا گوهۆڕینێ</button>
                <hr style="opacity: 0.1; margin-bottom: 20px;">
                <button id="logoutBtn" class="btn" style="background-color: #c0392b;">چوونەدەر (Log Out)</button>
            </div>
        </div>

        <!-- Support Section -->
        <div id="support" class="section">
            <div class="card">
                <h3><i class="fas fa-envelope"></i> نامەکێ بۆ مە فرێکە</h3>
                <p style="margin-bottom: 15px; color: #666;">ئەگەر کێشەک یان پێشنیارەک تە هەبیت، بۆ مە فرێکە.</p>
                <form id="supportForm">
                    <label>بابەت (Subject)</label>
                    <input type="text" id="supportSubject" placeholder="بابەتێ نامێ بنووسە..." required style="margin-bottom: 15px;">
                    <label>نامە (Message)</label>
                    <textarea id="supportMessage" rows="5" placeholder="ناما خۆ ل لێرە بنووسە..." required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;"></textarea>
                    <button type="submit" class="btn" style="margin-top: 15px; width: 100%;">فرێکرنا نامێ</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoCQo1yrieelrzAkIzNgegkv0w0sQvjho",
            authDomain: "mypredictionapp-f23e4.firebaseapp.com",
            projectId: "mypredictionapp-f23e4",
            storageBucket: "mypredictionapp-f23e4.firebasestorage.app",
            messagingSenderId: "821118473868",
            appId: "1:821118473868:web:00f4e5b7f0895cf7fb8da9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('profileEmail').value = user.email;
                document.getElementById('profileDisplayName').value = user.displayName || "";
                loadPredictions();
                loadChat();
            } else { window.location.href = "index.html"; }
        });

        // Navigation
        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if (id === 'chat') { scrollChat(); }
        };

        // PROFILE LOGIC
        document.getElementById('saveProfileBtn').addEventListener('click', () => {
            updateProfile(auth.currentUser, { displayName: document.getElementById('profileDisplayName').value })
                .then(() => alert("نووژەن بوو!")).catch(err => alert(err.message));
        });
        document.getElementById('changePassBtn').addEventListener('click', () => {
            sendPasswordResetEmail(auth, auth.currentUser.email).then(() => alert("لینک هاتە ناردن.")).catch(err => alert(err.message));
        });

        // PREDICTION LOGIC
        const predictionForm = document.getElementById('predictionForm');
        predictionForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "predictions"), {
                userId: auth.currentUser.uid,
                userName: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
                match: document.getElementById('matchName').value,
                score: document.getElementById('predictedScore').value,
                date: new Date().toISOString()
            });
            predictionForm.reset();
            loadPredictions();
        });

        async function loadPredictions() {
            const q = query(collection(db, "predictions"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('predictionList');
            list.innerHTML = "<h3>هەموو پێشبینی</h3>";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="card" style="padding:15px; margin-bottom:10px;">
                    <small><b>${d.userName}</b> - ${new Date(d.date).toLocaleDateString()}</small><br>
                    <strong>${d.match}</strong>: <span style="color:var(--accent)">${d.score}</span>
                </div>`;
            });
        }

        // CHAT LOGIC (Real-time)
        const chatForm = document.getElementById('chatForm');
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('chatInput').value;
            if (!text.trim()) return;
            await addDoc(collection(db, "messages"), {
                userId: auth.currentUser.uid,
                userName: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
                text: text,
                timestamp: new Date().getTime()
            });
            chatForm.reset();
        });

        function loadChat() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(50));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const isMe = d.userId === auth.currentUser.uid;
                    const initial = d.userName ? d.userName.charAt(0).toUpperCase() : "?";
                    const time = new Date(d.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    box.innerHTML += `
                        <div style="display: flex; gap: 10px; align-items: flex-end; flex-direction: ${isMe ? 'row-reverse' : 'row'};">
                            <div style="width: 35px; height: 35px; background: ${isMe ? 'var(--sidebar)' : '#ccc'}; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; flex-shrink: 0;">
                                ${initial}
                            </div>
                            <div class="msg ${isMe ? 'msg-me' : 'msg-other'}" style="margin-bottom: 5px;">
                                <span class="msg-user">${isMe ? 'تۆ' : d.userName}</span>
                                ${d.text}
                                <span style="display: block; font-size: 0.6rem; opacity: 0.6; margin-top: 4px; text-align: ${isMe ? 'left' : 'right'};">
                                    ${time}
                                </span>
                            </div>
                        </div>
                    `;
                });
                scrollChat();
            });
        }
        function scrollChat() { const box = document.getElementById('chatBox'); box.scrollTop = box.scrollHeight; }

        // Support Logic
        document.getElementById('supportForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const sub = document.getElementById('supportSubject').value;
            const msg = document.getElementById('supportMessage').value;
            const myEmail = "iamshvan@gmail.com"; // لێرە ئیمەیڵی خۆت بنووسە
            window.location.href = `mailto:${myEmail}?subject=${sub}&body=${msg}`;
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>

</html>
